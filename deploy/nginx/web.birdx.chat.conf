# Web app + API (Node on SERVER_PORT, default 5174)

upstream birdx_web {
  server 127.0.0.1:5174;
  keepalive 32;
}

server {
  listen 443 ssl http2;
  server_name web.birdx.chat;

  ssl_certificate     /etc/letsencrypt/live/birdx.chat/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/birdx.chat/privkey.pem;

  client_max_body_size 75m;

  location /api/events {
    proxy_pass http://birdx_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_buffering off;
    proxy_cache off;
    add_header X-Accel-Buffering no;
  }

  location / {
    proxy_pass http://birdx_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
}

server {
  listen 80;
  server_name web.birdx.chat;
  return 301 https://$host$request_uri;
}
