# Marketing site (Astro static build)
# Deploy site/dist to /var/www/birdx-site and adjust root below.

server {
  listen 443 ssl http2;
  server_name birdx.chat www.birdx.chat;

  ssl_certificate     /etc/letsencrypt/live/birdx.chat/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/birdx.chat/privkey.pem;

  root /var/www/birdx-site;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /en/ {
    try_files $uri $uri/ /en/index.html;
  }
}

server {
  listen 80;
  server_name birdx.chat www.birdx.chat;
  return 301 https://$host$request_uri;
}
