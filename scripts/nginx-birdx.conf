# BirdX — Recommended Nginx Configuration
# Copy this file to /etc/nginx/sites-available/birdx
# Then: ln -s /etc/nginx/sites-available/birdx /etc/nginx/sites-enabled/
# Test: nginx -t && systemctl reload nginx

server {
    listen 443 ssl default_server;
    server_name YOUR_DOMAIN;
    client_max_body_size 78643200;

    ssl_certificate /etc/ssl/birdx/fullchain.pem;
    ssl_certificate_key /etc/ssl/birdx/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Service Worker — never cache
    location = /sw.js {
        proxy_pass http://127.0.0.1:5174;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # SSE (Server-Sent Events) — long-lived connections
    location /api/events {
        proxy_pass http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
    }

    # WebSocket (Socket.IO) — requires upgrade headers
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # All other requests — DO NOT use Connection "upgrade" here
    location / {
        proxy_pass http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}
